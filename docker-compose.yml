version: "3.3"

services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: henri
      POSTGRES_PASSWORD: henri
      POSTGRES_DB: henri
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U henri -d henri -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 3s
      retries: 30

  workspace-tool:
    build:
      context: ./workspace-tool
    restart: unless-stopped
    environment:
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      PORT: "8787"
    ports:
      - "8787:8787"
    volumes:
      - gws_config:/root/.config/gws

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  henri-core:
    build:
      context: ./henri-core
    restart: unless-stopped
    environment:
      PORT: "8080"
      MQTT_URL: mqtt://mqtt:1883
      MQTT_DEVICE_ID: c3-debug
      DATABASE_URL: postgres://henri:henri@db:5432/henri
      WORKSPACE_TOOL_URL: http://workspace-tool:8787
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
      LLM_MODE: always
      WEATHER_LAT: ""
      WEATHER_LON: ""
      TZ: America/Argentina/Buenos_Aires
    ports:
      - "8080:8080"
    depends_on:
      - mqtt
      - db
      - workspace-tool
      - ollama

volumes:
  mqtt_data:
  mqtt_log:
  db_data:
  gws_config:
  ollama_data:
